  <script src="/_aistudio-iframe.js"></script></head>
  <body>
    <div id="root"></div>
  
<script>
(function(){
  var themes=[
    {name:"নীল",color:"#1d72d2",bg:"#f5f8fb"},
    {name:"বেগুনি",color:"#7c3aed",bg:"#f5f3ff"},
    {name:"সবুজ",color:"#059669",bg:"#ecfdf5"},
    {name:"গোলাপি",color:"#e11d48",bg:"#fff1f2"},
    {name:"কমলা",color:"#ea580c",bg:"#fff7ed"}
  ];

  function applyTheme(t){
    document.documentElement.style.setProperty("--color-vocalize-blue",t.color);
    document.documentElement.style.setProperty("--color-vocalize-bg",t.bg);
    localStorage.setItem("bv_theme",JSON.stringify(t));
    document.querySelectorAll(".bv-theme-btn").forEach(function(b){
      b.style.outline = b.dataset.color === t.color ? "3px solid #334155" : "none";
    });
  }

  // Apply saved theme on load
  var saved = localStorage.getItem("bv_theme");
  if(saved){try{applyTheme(JSON.parse(saved));}catch(e){}}

  function buildCard(){
    var card = document.createElement("div");
    card.id = "bv-theme-card";
    card.style.cssText = "background:#fff;padding:20px 24px;border-radius:24px;border:1px solid #f1f5f9;box-shadow:0 1px 3px #0001;margin-bottom:12px;";
    
    var header = document.createElement("div");
    header.style.cssText = "display:flex;align-items:center;gap:12px;margin-bottom:16px;";
    
    var icon = document.createElement("div");
    icon.style.cssText = "width:36px;height:36px;background:#f1f5f9;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;";
    icon.textContent = "🎨";
    
    var titleWrap = document.createElement("div");
    var title = document.createElement("div");
    title.style.cssText = "font-size:13px;font-weight:700;color:#334155;";
    title.textContent = "থিম পরিবর্তন করুন";
    var sub = document.createElement("div");
    sub.style.cssText = "font-size:10px;color:#94a3b8;margin-top:2px;";
    sub.textContent = "আপনার পছন্দের রং বেছে নিন";
    titleWrap.appendChild(title);
    titleWrap.appendChild(sub);
    
    header.appendChild(icon);
    header.appendChild(titleWrap);
    card.appendChild(header);
    
    var btnRow = document.createElement("div");
    btnRow.style.cssText = "display:flex;gap:10px;flex-wrap:wrap;";
    
    var currentTheme = saved ? JSON.parse(saved) : themes[0];
    
    themes.forEach(function(t){
      var btn = document.createElement("button");
      btn.className = "bv-theme-btn";
      btn.dataset.color = t.color;
      btn.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none;cursor:pointer;padding:4px;border-radius:12px;";
      btn.style.outline = t.color === currentTheme.color ? "3px solid #334155" : "none";
      btn.style.outlineOffset = "2px";
      
      var circle = document.createElement("div");
      circle.style.cssText = "width:36px;height:36px;border-radius:50%;background:"+t.color+";box-shadow:0 2px 6px "+t.color+"66;";
      
      var label = document.createElement("span");
      label.style.cssText = "font-size:9px;font-weight:600;color:#64748b;";
      label.textContent = t.name;
      
      btn.appendChild(circle);
      btn.appendChild(label);
      btn.addEventListener("click", function(){applyTheme(t);});
      btnRow.appendChild(btn);
    });
    
    card.appendChild(btnRow);
    return card;
  }

  function injectIfNeeded(){
    // Look for the History Limit text as anchor
    var spans = document.querySelectorAll("span");
    var anchor = null;
    for(var i=0;i<spans.length;i++){
      if(spans[i].textContent.trim()==="History Limit"){
        anchor = spans[i];
        break;
      }
    }
    if(!anchor) return false;
    
    // Walk up to find the card div (bg-white rounded)
    var card = anchor.closest("div[class*=bg-white]");
    if(!card) return false;
    
    if(document.getElementById("bv-theme-card")) return true; // already injected
    
    card.parentNode.insertBefore(buildCard(), card);
    return true;
  }

  var obs = new MutationObserver(function(){
    if(injectIfNeeded()) {/* keep observing for tab switches */}
  });
  obs.observe(document.body, {childList:true, subtree:true});
})();
</script>

</body>
